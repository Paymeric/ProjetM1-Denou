---
- name: Reconfigurer complètement Switch 4 via NCLU
  shell: |
    net abort || true
    net del all || true

    # Interface de management
    net add interface eth0 ip address 10.0.0.54/24
    net add interface eth0 vrf mgmt

    # Bridge VLAN-aware et ports montants
    net add bridge bridge ports swp1,swp2
    net add bridge bridge vids 10,20
    net add bridge bridge vlan-aware

    net add interface swp1 bridge vids 10,20
    net add interface swp2 bridge vids 10,20

    # VLAN 10
    net add vlan 10 ip address 192.168.1.253/24
    net add vlan 10 ip address-virtual 00:00:5E:00:01:10 192.168.1.254/24

    # VLAN 20
    net add vlan 20 ip address 192.168.2.253/24
    net add vlan 20 ip address-virtual 00:00:5E:00:01:20 192.168.2.254/24

    # VRF mgmt
    net add vrf mgmt ip address 127.0.0.1/8
    net add vrf mgmt ipv6 address ::1/128
    net add vrf mgmt vrf-table auto

    net commit
  args:
    executable: /bin/bash
  register: nclu_config
  changed_when: true

- name: Afficher le résultat NCLU de switch4
  debug:
    var: nclu_config.stdout_lines

- name: Vérifier la configuration du switch 4
  shell: |
    net show configuration
    echo "--------------------"
    ip a
    echo "--------------------"
    bridge vlan show
    echo "--------------------"
    ip route
  args:
    executable: /bin/bash
  register: sw4_check
  changed_when: false

- name: Afficher la vérification de switch4
  debug:
    var: sw4_check.stdout
