---
- name: Déployer /etc/network/interfaces sur switch3
  copy:
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: '0644'
    content: |
      auto lo
      iface lo inet loopback

      auto eth0
      iface eth0
          address 10.0.0.53/24
          vrf mgmt

      auto bridge
      iface bridge
          bridge-ports swp1 swp2
          bridge-vlan-aware yes
          bridge-vids 10 20

      auto vlan10
      iface vlan10
          address 192.168.1.252/24
          vrrp 10 192.168.1.254/24
          vlan-id 10
          vlan-raw-device bridge

      auto vlan20
      iface vlan20
          address 192.168.2.252/24
          vrrp 20 192.168.2.254/24
          vlan-id 20
          vlan-raw-device bridge

      auto mgmt
      iface mgmt
          address 127.0.0.1/8
          address ::1/128
          vrf-table auto

- name: Activer vrrpd dans FRR
  lineinfile:
    path: /etc/frr/daemons
    regexp: '^vrrpd='
    line: 'vrrpd=yes'

- name: Déployer /etc/frr/frr.conf sur switch3
  copy:
    dest: /etc/frr/frr.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      service integrated-vtysh-config
      !
      interface vlan10
       vrrp 10
       vrrp 10 priority 200
       vrrp 10 ip 192.168.1.254
      !
      interface vlan20
       vrrp 20
       vrrp 20 priority 100
       vrrp 20 ip 192.168.2.254
      !
      line vty

- name: Recharger la configuration réseau de switch3
  shell: ifreload -a
  args:
    executable: /bin/bash

- name: Redémarrer FRR sur switch3
  service:
    name: frr
    state: restarted

- name: Vérifier VRRP sur switch3
  shell: |
    echo "===== /etc/network/interfaces ====="
    cat /etc/network/interfaces
    echo "===== /etc/frr/frr.conf ====="
    cat /etc/frr/frr.conf
    echo "===== show vrrp ====="
    vtysh -c "show vrrp"
  args:
    executable: /bin/bash
  register: sw3_check
  changed_when: false

- name: Afficher la vérification de switch3
  debug:
    var: sw3_check.stdout

