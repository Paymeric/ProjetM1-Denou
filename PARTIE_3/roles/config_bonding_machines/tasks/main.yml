---
- name: Charger le module bonding
  modprobe:
    name: bonding
    state: present

- name: Charger le module 8021q
  modprobe:
    name: 8021q
    state: present

- name: Configurer /etc/network/interfaces pour machine1
  copy:
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: '0644'
    content: |
      source /etc/network/interfaces.d/*

      auto lo
      iface lo inet loopback

      auto ens33
      iface ens33 inet static
          address 10.0.0.41/24

      allow-hotplug ens34
      iface ens34 inet manual
          bond-master bond0

      allow-hotplug ens35
      iface ens35 inet manual
          bond-master bond0

      auto bond0
      iface bond0 inet static
          address 192.168.1.1/24
          gateway 192.168.1.254
          bond-mode 802.3ad
          bond-miimon 100
          bond-lacp-rate 1
          bond-slaves ens34 ens35
          bond-xmit-hash-policy layer3+4
  when: inventory_hostname == "machine1"

- name: Configurer /etc/network/interfaces pour machine2
  copy:
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: '0644'
    content: |
      source /etc/network/interfaces.d/*

      auto lo
      iface lo inet loopback

      auto ens33
      iface ens33 inet static
          address 10.0.0.42/24

      allow-hotplug ens34
      iface ens34 inet manual
          bond-master bond0

      allow-hotplug ens35
      iface ens35 inet manual
          bond-master bond0

      auto bond0
      iface bond0 inet static
          address 192.168.2.1/24
          gateway 192.168.2.254
          bond-mode 802.3ad
          bond-miimon 100
          bond-lacp-rate 1
          bond-slaves ens34 ens35
          bond-xmit-hash-policy layer3+4
  when: inventory_hostname == "machine2"

- name: Redémarrer le réseau
  service:
    name: networking
    state: restarted

- name: Vérifier les interfaces réseau
  shell: |
    ip a
    echo "----------------"
    ip route
    echo "----------------"
    cat /proc/net/bonding/bond0
  register: bonding_check
  changed_when: false

- name: Afficher la vérification bonding
  debug:
    var: bonding_check.stdout
