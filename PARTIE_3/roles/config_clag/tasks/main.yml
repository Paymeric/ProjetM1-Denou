  when: inventory_hostname == "switch2"

- name: Appliquer la configuration réseau Cumulus
  shell: ifreload -a
  args:
    executable: /bin/bash

- name: Vérifier la config CLAG
  shell: |
    net show configuration commands
    echo "----------------"
    clagctl
    echo "----------------"
    bridge vlan show
    echo "----------------"
    ip a
  args:
    executable: /bin/bash
  register: clag_check
  changed_when: false

- name: Afficher la vérification CLAG
  debug:
    var: clag_check.stdout
