- name: Configurer l'IP de prod et la route pour Machine 1 (VLAN 10)
  copy:
    dest: /etc/network/interfaces.d/prod
    content: |
      auto ens34
      iface ens34 inet static
          address 192.168.10.1
          netmask 255.255.255.0
          up ip route add 192.168.30.0/24 via 192.168.10.254 dev ens34
  when: inventory_hostname == "machine1"

- name: Configurer l'IP de prod et la route pour Machine 2 (VLAN 20)
  copy:
    dest: /etc/network/interfaces.d/prod
    content: |
      auto ens34
      iface ens34 inet static
          address 192.168.20.1
          netmask 255.255.255.0
          up ip route add 192.168.30.0/24 via 192.168.20.254 dev ens34
  when: inventory_hostname == "machine2"
- name: Activer l'interface de production
  shell: ifdown ens34 || true && ifup ens34

- name: Installer le paquet client NFS
  apt:
    name: nfs-common
    state: present
    update_cache: yes

- name: Créer le point de montage local spécifique
  file:
    path: "/{{ inventory_hostname }}"
    state: directory
    mode: '0777'

- name: Configurer /etc/fstab et monter le dossier NFS
  mount:
    path: "/{{ inventory_hostname }}"
    src: "192.168.30.100:/{{ inventory_hostname }}"
    fstype: nfs4
    opts: "rw,sync,hard,_netdev"
    state: present
